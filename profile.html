<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プロフィール | SpellDash</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/game.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </a>

      <nav class="site-nav" aria-label="メインナビ">
        <a href="/" class="site-nav__link">プレイ</a>
        <a href="./stats.html" class="site-nav__link">学習データ</a>
      </nav>

      <div class="account">
        <div class="account__guest dropdown" id="accountGuest" hidden>
          <button
            class="btn btn--sm btn--ghost"
            id="loginToggle"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            ログイン
          </button>

          <div class="dropdown__panel">
            <form class="account-menu account-menu--login" id="accountLogin">
              <p class="account-menu__hint">
                メールアドレスにログインリンクを送ります。
              </p>
              <input
                id="emailInput"
                type="email"
                placeholder="メールアドレス"
                autocomplete="email"
              />
              <button id="loginButton" type="submit" class="btn btn--sm">
                リンクを送信
              </button>
            </form>
          </div>
        </div>

        <div class="account__user dropdown" id="accountUser" hidden>
          <button
            class="avatar-button"
            id="avatarButton"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="アカウントメニュー"
          >
            <span class="avatar" id="headerAvatar">?</span>
          </button>

          <div class="dropdown__panel">
            <div class="account-menu" id="accountMenu">
              <p class="account-menu__email" id="userStatus"></p>
              <a class="account-menu__item" href="./profile.html">プロフィール</a>
              <button
                class="account-menu__item account-menu__item--danger"
                id="logoutButton"
                type="button"
              >
                ログアウト
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app">
    <section class="hero">
      <p class="logo">プロフィール</p>
      <h1>マイページ</h1>
      <p class="subtitle">
        アカウント情報と、これまでの学習の記録をまとめて確認できます。
      </p>
      <p class="auth-message" id="authMessage" role="status"></p>
    </section>

    <section class="result-card" id="profileLoggedOut">
      <h3>ログインしていません</h3>
      <p class="muted">
        右上のメールアドレス欄からログインすると、プロフィールが表示されます。
      </p>
    </section>

    <section class="result-card profile-card" id="profileCard" hidden>
      <div class="profile-head">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-head__body">
          <p class="profile-email" id="profileEmail"></p>
          <p class="muted" id="profileJoined"></p>
        </div>
      </div>
    </section>

    <section class="result-card">
      <h3>学習サマリー</h3>
      <div class="metric-grid" id="profileSummary"></div>
    </section>

    <section class="result-card">
      <h3>タイピング</h3>
      <div class="metric-grid" id="profileTyping"></div>
    </section>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </div>

      <p class="site-footer__tagline">
        タイピングで、英単語を体に覚えさせる。
      </p>

      <nav class="site-footer__nav" aria-label="フッターナビ">
        <a href="https://github.com/hirohiro7300/spelldash" target="_blank" rel="noopener">GitHub</a>
        <a href="#">使い方</a>
        <a href="#">プライバシー</a>
      </nav>

      <p class="site-footer__copy">© <span id="footerYear">2026</span> SpellDash</p>
    </div>
  </footer>

  <script type="module" src="./js/profileView.js"></script>
</body>
</html>
