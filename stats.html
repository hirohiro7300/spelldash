<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学習データ | SpellDash</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/game.css" />
  <link rel="stylesheet" href="./css/responsive.css" />


  <meta name="description" content="スコア推移・思い出し成功率・習得の進捗。あなたの学習の記録。" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SpellDash" />
  <meta property="og:title" content="学習データ | SpellDash" />
  <meta property="og:description" content="スコア推移・思い出し成功率・習得の進捗。あなたの学習の記録。" />
  <meta property="og:url" content="https://www.spelldash.net/stats.html" />
  <meta property="og:image" content="https://www.spelldash.net/assets/images/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </a>

      <nav class="site-nav" aria-label="メインナビ">
        <a href="/" class="site-nav__link">プレイ</a>
        <a href="./battle.html" class="site-nav__link">バトル</a>
        <a href="./stats.html" class="site-nav__link" aria-current="page">学習データ</a>
      </nav>

      <div class="account">
        <div class="account__guest dropdown" id="accountGuest" hidden>
          <button
            class="btn btn--sm btn--ghost"
            id="loginToggle"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            ログイン
          </button>

          <div class="dropdown__panel">
            <form class="account-menu account-menu--login" id="accountLogin">
              <button
                id="googleLoginButton"
                type="button"
                class="btn btn--sm btn--google"
              >
                Googleでログイン
              </button>

              <div class="account-menu__divider">または</div>

              <p class="account-menu__hint">
                メールアドレスにログインリンクを送ります。
              </p>
              <input
                id="emailInput"
                type="email"
                placeholder="メールアドレス"
                autocomplete="email"
              />
              <button id="loginButton" type="submit" class="btn btn--sm">
                リンクを送信
              </button>
            </form>
          </div>
        </div>

        <div class="account__user dropdown" id="accountUser" hidden>
          <button
            class="avatar-button"
            id="avatarButton"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="アカウントメニュー"
          >
            <span class="avatar" id="headerAvatar">?</span>
          </button>

          <div class="dropdown__panel">
            <div class="account-menu" id="accountMenu">
              <p class="account-menu__email" id="userStatus"></p>
              <a class="account-menu__item" href="./profile.html">プロフィール</a>
              <button
                class="account-menu__item account-menu__item--danger"
                id="logoutButton"
                type="button"
              >
                ログアウト
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app">
    <section class="hero hero--compact">
      <p class="logo">学習データ</p>
      <h1>あなたの学習の記録。</h1>
      <p class="subtitle">
        これまでの練習で貯まったデータをまとめて確認できます。
      </p>
      <p class="auth-message" id="authMessage" role="status"></p>
    </section>

    <section class="level-bar" id="levelBar"></section>

    <section class="metric-grid" id="overview"></section>

    <section class="result-card">
      <h3>タイピング分析</h3>
      <div class="metric-grid" id="typingMetrics"></div>
    </section>

    <section class="result-card">
      <h3>今週のまとめ</h3>
      <div class="metric-grid" id="weeklySummary"></div>
    </section>

    <section class="result-card">
      <h3>スコア推移</h3>
      <div id="scoreTrend"></div>
    </section>

    <section class="result-card">
      <h3>習得の進捗</h3>
      <div id="progress"></div>
    </section>

    <section class="result-card">
      <h3>語根ファミリー</h3>
      <p class="muted">同じ語根の仲間をそろえると、単語は忘れにくくなります。</p>
      <div id="wordFamilies"></div>
    </section>

    <section class="result-card">
      <h3>苦手単語</h3>
      <div id="weakWords">まだデータがありません。</div>
    </section>

    <section class="result-card">
      <details class="word-list-fold">
        <summary>単語一覧を開く（検索・カテゴリで絞り込み）</summary>

        <select id="wordCategoryFilter" class="word-filter"></select>

        <input
          id="wordSearch"
          type="text"
          placeholder="英単語・日本語・タグで検索"
          autocomplete="off"
        />

        <div id="wordList"></div>
      </details>
    </section>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </div>

      <p class="site-footer__tagline">
        タイピングで、英単語を体に覚えさせる。
      </p>

      <nav class="site-footer__nav" aria-label="フッターナビ">
        <a href="https://github.com/hirohiro7300/spelldash" target="_blank" rel="noopener">GitHub</a>
        <a href="./privacy.html">プライバシー</a>
      </nav>

      <p class="site-footer__copy">© <span id="footerYear">2026</span> SpellDash</p>
    </div>
  </footer>

  <script type="module" src="./js/statsView.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
