<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpellDash</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/game.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </a>

      <div class="account">
        <form class="account__login" id="accountLogin">
          <input
            id="emailInput"
            type="email"
            placeholder="メールアドレス"
            autocomplete="email"
          />
          <button id="loginButton" type="submit" class="btn btn--sm">
            ログイン
          </button>
        </form>

        <div class="account__user" id="accountUser" hidden>
          <span class="account__email" id="userStatus"></span>
          <button id="logoutButton" type="button" class="btn btn--sm btn--ghost">
            ログアウト
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="app">
    <section class="hero">
      <p class="logo">英単語タイピング学習</p>
      <h1>英単語を、思い出して打つ。</h1>
      <p class="subtitle">
        スペルを隠して記憶からタイピング。ミスしたら答えを見ながら復習。
      </p>
      <p class="auth-message" id="authMessage" role="status"></p>
    </section>

    <section class="stats">
      <div class="stat-card">
        <span>残り時間</span>
        <strong><span id="time">60</span>秒</strong>
      </div>

      <div class="stat-card">
        <span>スコア</span>
        <strong id="score">0</strong>
      </div>

      <div class="stat-card">
        <span>ミス</span>
        <strong id="miss">0</strong>
      </div>

      <div class="stat-card">
        <span>平均タイプ</span>
        <strong><span id="typeSpeed">0.0</span>打/秒</strong>
      </div>

      <div class="stat-card">
        <span>ベスト</span>
        <strong id="bestScore">0</strong>
      </div>
    </section>

    <main class="game-card">
      <p class="label">日本語訳</p>
      <h2 id="japanese">Enterキーでスタート</h2>

      <p id="word" class="hidden-word">スペルはまだ非表示</p>

      <!-- 入力欄の中に虹色テキストを重ねる -->
      <div class="input-wrapper">
        <div id="typedPreview" class="typed-preview"></div>

        <input
          id="input"
          type="text"
          placeholder="英単語を入力"
          autocomplete="off"
          autofocus
        />
      </div>

      <p id="message" class="message">Enterキーでゲーム開始</p>

      <button id="restart">もう一回</button>
    </main>

    <section class="result-card">
      <h3>学習データ</h3>
      <div id="weakWords">まだデータがありません。</div>
    </section>

    <section class="result-card">
      <h3>単語一覧</h3>

      <input
        id="wordSearch"
        type="text"
        placeholder="英単語・日本語で検索"
        autocomplete="off"
      />

      <div id="wordList"></div>
    </section>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </div>

      <p class="site-footer__tagline">
        タイピングで、英単語を体に覚えさせる。
      </p>

      <nav class="site-footer__nav" aria-label="フッターナビ">
        <a href="https://github.com/hirohiro7300/spelldash" target="_blank" rel="noopener">GitHub</a>
        <a href="#">使い方</a>
        <a href="#">プライバシー</a>
      </nav>

      <p class="site-footer__copy">© <span id="footerYear">2026</span> SpellDash</p>
    </div>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
