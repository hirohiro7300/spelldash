<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpellDash</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/game.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </a>

      <nav class="site-nav" aria-label="メインナビ">
        <a href="/" class="site-nav__link" aria-current="page">プレイ</a>
        <a href="./stats.html" class="site-nav__link">学習データ</a>
      </nav>

      <div class="account">
        <div class="account__guest dropdown" id="accountGuest" hidden>
          <button
            class="btn btn--sm btn--ghost"
            id="loginToggle"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            ログイン
          </button>

          <div class="dropdown__panel">
            <form class="account-menu account-menu--login" id="accountLogin">
              <button
                id="googleLoginButton"
                type="button"
                class="btn btn--sm btn--google"
              >
                Googleでログイン
              </button>

              <div class="account-menu__divider">または</div>

              <p class="account-menu__hint">
                メールアドレスにログインリンクを送ります。
              </p>
              <input
                id="emailInput"
                type="email"
                placeholder="メールアドレス"
                autocomplete="email"
              />
              <button id="loginButton" type="submit" class="btn btn--sm">
                リンクを送信
              </button>
            </form>
          </div>
        </div>

        <div class="account__user dropdown" id="accountUser" hidden>
          <button
            class="avatar-button"
            id="avatarButton"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="アカウントメニュー"
          >
            <span class="avatar" id="headerAvatar">?</span>
          </button>

          <div class="dropdown__panel">
            <div class="account-menu" id="accountMenu">
              <p class="account-menu__email" id="userStatus"></p>
              <a class="account-menu__item" href="./profile.html">プロフィール</a>
              <button
                class="account-menu__item account-menu__item--danger"
                id="logoutButton"
                type="button"
              >
                ログアウト
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app">
    <section class="hero">
      <p class="logo">英単語タイピング学習</p>
      <h1>英単語を、思い出して打つ。</h1>
      <p class="subtitle">
        スペルを隠して記憶からタイピング。ミスしたら答えを見ながら復習。
      </p>
      <p class="auth-message" id="authMessage" role="status"></p>
    </section>

    <section class="mission" id="missionCard"></section>

    <section class="level-bar" id="levelBar"></section>

    <section class="category-picker" id="categoryPicker" aria-label="出題カテゴリ"></section>

    <section class="mode-switch" id="modeSwitch" aria-label="モード切替">
      <button type="button" class="mode-switch__btn" data-mode="study">
        Study
        <span>じっくり思い出して覚える</span>
      </button>
      <button type="button" class="mode-switch__btn" data-mode="challenge">
        Challenge
        <span>60秒で定着度を測る</span>
      </button>
    </section>

    <section class="stats">
      <div class="stat-card stat-card--challenge">
        <span>残り時間</span>
        <strong><span id="time">60</span>秒</strong>
      </div>

      <div class="stat-card">
        <span>正解</span>
        <strong id="score">0</strong>
      </div>

      <div class="stat-card">
        <span>思い出せず</span>
        <strong id="recallFail">0</strong>
      </div>

      <div class="stat-card">
        <span>ミスタイプ</span>
        <strong id="miss">0</strong>
      </div>

      <div class="stat-card stat-card--challenge">
        <span>平均タイプ</span>
        <strong><span id="typeSpeed">0.0</span>打/秒</strong>
      </div>

      <div class="stat-card stat-card--challenge">
        <span>ベスト</span>
        <strong id="bestScore">0</strong>
      </div>
    </section>

    <main class="game-card">
      <p class="label">日本語訳</p>
      <h2 id="japanese">Enterキーでスタート</h2>

      <p id="word" class="hidden-word">スペルはまだ非表示</p>

      <button
        id="speakButton"
        type="button"
        class="speak-button"
        aria-label="発音を再生"
        hidden
      >
        🔊 発音
      </button>

      <!-- 入力欄の中に虹色テキストを重ねる -->
      <div class="input-wrapper">
        <div id="typedPreview" class="typed-preview"></div>

        <input
          id="input"
          type="text"
          placeholder="英単語を入力"
          autocomplete="off"
          autofocus
        />
      </div>

      <p id="combo" class="combo"></p>

      <p id="message" class="message">単語データを読み込み中…</p>

      <button id="restart">もう一回</button>
    </main>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <span class="brand__mark">SD</span>
        <span class="brand__name">SpellDash</span>
      </div>

      <p class="site-footer__tagline">
        タイピングで、英単語を体に覚えさせる。
      </p>

      <nav class="site-footer__nav" aria-label="フッターナビ">
        <a href="https://github.com/hirohiro7300/spelldash" target="_blank" rel="noopener">GitHub</a>
        <a href="./privacy.html">プライバシー</a>
      </nav>

      <p class="site-footer__copy">© <span id="footerYear">2026</span> SpellDash</p>
    </div>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
