name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存インストール
        run: npm install

      - name: Chromiumインストール
        run: npx playwright-core install --with-deps chromium

      - name: 単語データ検証
        run: node scripts/validate-words.mjs

      - name: E2Eスモークテスト
        run: npm test
